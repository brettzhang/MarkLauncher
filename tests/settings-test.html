<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置功能测试</title>
    <style>
        body {
            margin: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #4A90E2;
        }
        .btn {
            background: #4A90E2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 10px 10px 10px 0;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #357ABD;
        }
        .result {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 13px;
        }
        h1 { color: #333; }
        h2 { color: #4A90E2; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔧 MarkLauncher 设置功能测试</h1>

        <div class="test-section">
            <h2>设置弹窗测试</h2>
            <p>测试设置弹窗的打开、关闭和功能切换。</p>

            <button class="btn" onclick="openSettings()">打开设置</button>
            <button class="btn" onclick="closeSettings()">关闭设置</button>
            <button class="btn" onclick="switchToAbout()">切换到关于页面</button>
            <button class="btn" onclick="switchToSearch()">切换到搜索设置</button>

            <div id="result" class="result" style="display: none;"></div>
        </div>

        <div class="test-section">
            <h2>搜索引擎测试</h2>
            <p>测试不同搜索引擎的URL生成。</p>

            <button class="btn" onclick="testSearchEngine('google')">测试Google</button>
            <button class="btn" onclick="testSearchEngine('bing')">测试Bing</button>
            <button class="btn" onclick="testSearchEngine('baidu')">测试百度</button>

            <div id="searchResult" class="result" style="display: none;"></div>
        </div>

        <div class="test-section">
            <h2>设置存储测试</h2>
            <p>测试设置的保存和读取功能。</p>

            <button class="btn" onclick="saveTestSettings()">保存测试设置</button>
            <button class="btn" onclick="loadTestSettings()">加载测试设置</button>
            <button class="btn" onclick="clearTestSettings()">清除测试设置</button>

            <div id="storageResult" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 模拟设置功能
        let settings = {
            searchEngine: 'google'
        };

        const searchEngineUrls = {
            google: 'https://www.google.com/search?q=',
            bing: 'https://www.bing.com/search?q=',
            baidu: 'https://www.baidu.com/s?wd='
        };

        function openSettings() {
            showResult('设置弹窗已打开', 'result');
            console.log('打开设置弹窗');
        }

        function closeSettings() {
            showResult('设置弹窗已关闭', 'result');
            console.log('关闭设置弹窗');
        }

        function switchToAbout() {
            showResult('已切换到关于页面', 'result');
            console.log('切换到关于页面');
        }

        function switchToSearch() {
            showResult('已切换到搜索设置', 'result');
            console.log('切换到搜索设置');
        }

        function testSearchEngine(engine) {
            const testQuery = 'Chrome扩展';
            const url = searchEngineUrls[engine] + encodeURIComponent(testQuery);
            showResult(`${engine.toUpperCase()} 搜索URL: ${url}`, 'searchResult');
            console.log(`${engine} 搜索URL:`, url);
        }

        function saveTestSettings() {
            // 模拟保存设置
            const testSettings = {
                searchEngine: 'baidu',
                theme: 'dark',
                language: 'zh-CN'
            };

            // 模拟 Chrome Storage API
            if (typeof chrome !== 'undefined' && chrome.storage) {
                chrome.storage.sync.set({ marklauncher_settings: testSettings }, () => {
                    showResult('设置已保存到Chrome Storage: ' + JSON.stringify(testSettings), 'storageResult');
                });
            } else {
                localStorage.setItem('marklauncher_settings', JSON.stringify(testSettings));
                showResult('设置已保存到LocalStorage: ' + JSON.stringify(testSettings), 'storageResult');
            }
            settings = { ...settings, ...testSettings };
        }

        function loadTestSettings() {
            if (typeof chrome !== 'undefined' && chrome.storage) {
                chrome.storage.sync.get(['marklauncher_settings'], (result) => {
                    if (result.marklauncher_settings) {
                        settings = { ...settings, ...result.marklauncher_settings };
                        showResult('从Chrome Storage加载设置: ' + JSON.stringify(result.marklauncher_settings), 'storageResult');
                    } else {
                        showResult('Chrome Storage中没有找到设置', 'storageResult');
                    }
                });
            } else {
                const saved = localStorage.getItem('marklauncher_settings');
                if (saved) {
                    const loadedSettings = JSON.parse(saved);
                    settings = { ...settings, ...loadedSettings };
                    showResult('从LocalStorage加载设置: ' + saved, 'storageResult');
                } else {
                    showResult('LocalStorage中没有找到设置', 'storageResult');
                }
            }
        }

        function clearTestSettings() {
            if (typeof chrome !== 'undefined' && chrome.storage) {
                chrome.storage.sync.remove(['marklauncher_settings'], () => {
                    showResult('已从Chrome Storage清除设置', 'storageResult');
                });
            } else {
                localStorage.removeItem('marklauncher_settings');
                showResult('已从LocalStorage清除设置', 'storageResult');
            }
            settings = { searchEngine: 'google' };
        }

        function showResult(message, elementId) {
            const element = document.getElementById(elementId);
            element.textContent = new Date().toLocaleTimeString() + ': ' + message;
            element.style.display = 'block';

            // 3秒后隐藏结果
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            showResult('设置功能测试页面已加载', 'result');
        });
    </script>
</body>
</html>
