<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkLauncher 测试页面</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            border-left: 4px solid #4A90E2;
        }
        .success { border-left-color: #28a745; }
        .warning { border-left-color: #ffc107; }
        .error { border-left-color: #dc3545; }
        .btn {
            background: #4A90E2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 4px;
        }
        .btn:hover { background: #357ABD; }
        #results {
            background: #f1f3f4;
            border-radius: 4px;
            padding: 12px;
            margin-top: 16px;
            min-height: 100px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>🧪 MarkLauncher 扩展测试</h1>

    <div class="test-section success">
        <h2>✅ 安装检查</h2>
        <p>如果这个页面能正常显示，说明扩展文件结构正确。</p>
        <button class="btn" onclick="checkFileStructure()">检查文件结构</button>
    </div>

    <div class="test-section">
        <h2>🔧 Chrome API 检查</h2>
        <p>检查Chrome扩展API是否可用。</p>
        <button class="btn" onclick="checkChromeAPI()">检查Chrome API</button>
    </div>

    <div class="test-section">
        <h2>📚 书签权限检查</h2>
        <p>检查书签读取权限。</p>
        <button class="btn" onclick="checkBookmarkPermission()">检查书签权限</button>
    </div>

    <div class="test-section">
        <h2>🎨 样式检查</h2>
        <p>测试CSS文件是否正确加载。</p>
        <button class="btn" onclick="testStyles()">测试样式</button>
    </div>

    <div id="results">点击上方按钮开始测试...</div>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            results.textContent += `[${timestamp}] ${prefix} ${message}\n`;
        }

        function checkFileStructure() {
            log('开始检查文件结构...');

            const requiredFiles = [
                'manifest.json',
                'newtab.html',
                'newtab.js',
                'styles.css',
                'background.js',
                'icons/icon.svg'
            ];

            requiredFiles.forEach(file => {
                fetch(file, { method: 'HEAD' })
                    .then(response => {
                        if (response.ok) {
                            log(`✓ ${file} 存在且可访问`, 'success');
                        } else {
                            log(`✗ ${file} 不存在或无法访问 (${response.status})`, 'error');
                        }
                    })
                    .catch(error => {
                        log(`✗ ${file} 检查失败: ${error.message}`, 'error');
                    });
            });
        }

        function checkChromeAPI() {
            log('检查Chrome API可用性...');

            if (typeof chrome === 'undefined') {
                log('Chrome对象不存在 - 可能不在Chrome扩展环境中运行', 'error');
                return;
            }

            const apis = [
                'chrome.runtime',
                'chrome.bookmarks',
                'chrome.tabs',
                'chrome.storage'
            ];

            apis.forEach(api => {
                try {
                    const apiPath = api.split('.');
                    let apiObj = chrome;
                    let available = true;

                    for (const part of apiPath) {
                        if (!apiObj[part]) {
                            available = false;
                            break;
                        }
                        apiObj = apiObj[part];
                    }

                    if (available) {
                        log(`✓ ${api} 可用`, 'success');
                    } else {
                        log(`✗ ${api} 不可用`, 'error');
                    }
                } catch (error) {
                    log(`✗ ${api} 检查失败: ${error.message}`, 'error');
                }
            });
        }

        function checkBookmarkPermission() {
            log('检查书签权限...');

            if (!chrome.bookmarks) {
                log('Chrome bookmarks API不可用', 'error');
                return;
            }

            try {
                chrome.bookmarks.getTree((bookmarkTree) => {
                    if (chrome.runtime.lastError) {
                        log(`书签权限错误: ${chrome.runtime.lastError.message}`, 'error');
                        return;
                    }

                    const bookmarkCount = countBookmarks(bookmarkTree);
                    log(`✓ 书签权限正常，共 ${bookmarkCount} 个书签`, 'success');
                });
            } catch (error) {
                log(`书签API调用失败: ${error.message}`, 'error');
            }
        }

        function countBookmarks(nodes) {
            let count = 0;
            for (const node of nodes) {
                if (node.url) {
                    count++;
                } else if (node.children) {
                    count += countBookmarks(node.children);
                }
            }
            return count;
        }

        function testStyles() {
            log('测试CSS样式...');

            // 检查CSS是否能正确加载
            fetch('styles.css')
                .then(response => {
                    if (response.ok) {
                        return response.text();
                    }
                    throw new Error(`CSS文件加载失败: ${response.status}`);
                })
                .then(cssContent => {
                    if (cssContent.includes('.bookmark-item')) {
                        log('✓ CSS样式文件加载正常，包含主要样式类', 'success');
                    } else {
                        log('⚠️ CSS文件已加载但可能缺少主要样式', 'warning');
                    }
                })
                .catch(error => {
                    log(`CSS样式测试失败: ${error.message}`, 'error');
                });
        }

        // 页面加载时自动运行基础检查
        window.addEventListener('load', () => {
            log('MarkLauncher 扩展测试页面已加载');
            checkFileStructure();
        });
    </script>
</body>
</html>
